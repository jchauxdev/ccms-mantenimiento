<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - CMMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilo para la imagen de fondo del lado derecho */
        .bg-image {
            /* He puesto una imagen industrial de prueba de Unsplash. Luego la puedes cambiar */
            background-image: url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row vh-100"> <div class="col-12 col-md-5 col-lg-4 d-flex align-items-center justify-content-center bg-white shadow-lg z-1">
                <div class="w-75">
                    
                    <div class="mb-4 text-center">
                        <h2 class="fw-bold text-primary">CMMS</h2>
                        <h4 class="fw-bold">Iniciar Sesión</h4>
                        <p class="text-muted">Ingresa tus credenciales para acceder al sistema de mantenimiento.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">USUARIO</label>
                            <input type="text" name="username" class="form-control p-2" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                            <input type="password" name="password" class="form-control p-2" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Ingresar</button>
                    </form>
                    
                </div>
            </div>

            <div class="col-md-7 col-lg-8 bg-image d-none d-md-block">
                <div class="d-flex h-100 align-items-end p-5" style="background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);">
                    <div class="text-white">
                        <h1 class="fw-bold">Gestión Inteligente de Activos</h1>
                        <p class="lead">Optimiza la vida útil de los equipos aplicando metodologías de mantenimiento de clase mundial.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
